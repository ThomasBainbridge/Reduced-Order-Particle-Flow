name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # CPU-only PyTorch for the model tests.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pytest
          pip install -e .

      - name: Run test suite
        run: pytest -q

      - name: Smoke-test the dataset pipeline
        run: |
          python scripts/generate_dataset.py --quick -o data/smoke.npz
          python scripts/make_figures.py -i data/smoke.npz -o /tmp/figs
          python scripts/run_baselines.py -i data/smoke.npz -o /tmp/figs
